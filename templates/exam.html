<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>ENVR3140 Exam</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/theme.js"></script>
</head>
<body class="exam-body">
    <div class="exam-layout">
        <!-- Left: Question panel -->
        <div class="question-panel">
            <div class="exam-header">
                <span class="student-name">{{ student_name }}</span>
                <span class="progress" id="progress">Question 1</span>
                <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()"></button>
                <button class="btn btn-finish" id="finish-btn" onclick="finishExam()">Finished</button>
            </div>
            <div style="margin:0.5rem 0 0.75rem;color:var(--text-muted);font-size:0.85rem">
                Resume token: <code>{{ resume_token }}</code>
            </div>

            <div class="card exam-card" id="question-card">
                <div class="question-text" id="question-text">Loading...</div>
                {% if show_answers %}
                <div class="card" id="debug-card" style="margin:0 0 1rem;background:rgba(37,99,235,0.08);border:1px solid rgba(37,99,235,0.2)">
                    <strong>Instructor Test Mode</strong>
                    <div id="debug-text" style="margin-top:0.35rem;color:var(--text-muted)"></div>
                </div>
                {% endif %}
                <div class="choices" id="choices"></div>
                <div class="feedback" id="feedback"></div>
                <button class="btn btn-primary" id="next-btn" style="display:none">Next Question</button>
            </div>

            <div class="card" id="loading-card" style="display:none">
                <div class="loading">Loading next question...</div>
            </div>

            <div class="card skill-chart-card" id="chart-card">
                <div class="skill-chart-header">
                    <span class="skill-chart-title" style="cursor:pointer" onclick="toggleChart()">Challenge Level</span>
                    <button class="chart-toggle" id="chart-toggle" onclick="toggleChart()" title="Hide/show chart">&#x25BC;</button>
                </div>
                <canvas id="skill-chart" width="700" height="160"></canvas>
            </div>

            <div class="keyboard-hint">
                <kbd>A</kbd>-<kbd>E</kbd> to answer &middot; <kbd>F</kbd> to skip &middot; <kbd>Enter</kbd> for next
            </div>
        </div>

        {% if exam.show_reference %}
        <!-- Resize handle -->
        <div class="resize-handle" id="resize-handle"></div>

        <!-- Right: PDF viewer -->
        <div class="pdf-panel" id="pdf-panel">
            <div class="pdf-header">
                <span>Reference Material</span>
            </div>
            <iframe id="pdf-viewer" src="/static/pdfviewer.html" style="width:100%;border:none;flex:1;background:#525659"></iframe>
        </div>
        {% endif %}
    </div>

    <script>
    const state = {
        currentItem: null,
        answered: false,
        questionNumber: 0,
        thetaHistory: [],
        startTime: Date.now(),
    };
    const appOrigin = window.location.origin;
    const csrfToken = document.querySelector('meta[name="csrf-token"]').content;
    const showAnswers = {{ "true" if show_answers else "false" }};

    function updateSkipUi(skipRemaining, skipBudget) {
        const button = document.getElementById("skip-btn");
        if (!button) return;
        const remaining = Math.max(0, Number(skipRemaining || 0));
        if (!skipBudget) return;
        if (remaining > 0) {
            button.textContent = `Skip (${remaining} left)`;
            button.disabled = state.answered;
        } else {
            button.textContent = "No skips remaining";
            button.disabled = true;
        }
    }

    // Tell PDF viewer which exam PDF to load
    const pdfViewer = document.getElementById("pdf-viewer");
    if (pdfViewer) {
        pdfViewer.addEventListener("load", () => {
            pdfViewer.contentWindow.postMessage({type: "loadPdf", url: "/exam/{{ exam.id }}/pdf"}, appOrigin);
        });
    }

    let pdfTargetPage = null;

    window.addEventListener("message", (e) => {
        if (e.origin !== appOrigin) return;
        if (e.data && e.data.type === "pageRendered") {
            pdfTargetPage = null; // ack received, stop retrying
        }
    });

    function navigatePdf(page) {
        if (!page || !pdfViewer) return;
        pdfTargetPage = page;
        let attempts = 0;
        function tryNav() {
            if (pdfTargetPage !== page) return;
            try {
                pdfViewer.contentWindow.postMessage({type: "goToPage", page: page}, appOrigin);
            } catch(e) {}
            if (attempts++ < 15) setTimeout(tryNav, 300);
        }
        tryNav();
    }

    async function loadNextQuestion() {
        state.answered = false;
        document.getElementById("feedback").innerHTML = "";
        document.getElementById("feedback").className = "feedback";
        document.getElementById("next-btn").style.display = "none";
        document.getElementById("question-card").style.display = "none";
        document.getElementById("loading-card").style.display = "block";

        const resp = await fetch("/api/next");
        const data = await resp.json();

        document.getElementById("loading-card").style.display = "none";

        if (data.error) {
            // Session lost (e.g. server restart) — redirect to start
            window.location.href = "/";
            return;
        }

        if (data.done) {
            window.location.href = "/exam/{{ exam.id }}/results";
            return;
        }

        state.currentItem = data;
        state.questionNumber = data.question_number;
        updateSkipUi(data.skip_remaining, data.skip_budget);

        // Guard against malformed response
        if (!data.question || !data.choices) {
            console.warn("Skipping malformed question:", data);
            loadNextQuestion();
            return;
        }

        document.getElementById("progress").textContent = `Question ${data.question_number}`;
        document.getElementById("question-text").textContent = data.question;
        if (showAnswers) {
            const blooms = data.blooms_name || '?';
            document.getElementById("debug-text").textContent =
                `Item #${data.item_id} | answer ${data.answer} | tier ${data.tier} | diff ${data.difficulty} | Bloom's ${blooms}`;
        }

        // Navigate PDF to source page
        if (data.pdf_page) {
            navigatePdf(data.pdf_page);
        }

        const choicesDiv = document.getElementById("choices");
        choicesDiv.innerHTML = "";
        for (const [letter, text] of Object.entries(data.choices)) {
            const btn = document.createElement("button");
            btn.className = "choice-btn";
            btn.dataset.letter = letter;
            const letterSpan = document.createElement("span");
            letterSpan.className = "choice-letter";
            letterSpan.textContent = letter;
            btn.appendChild(letterSpan);
            btn.appendChild(document.createTextNode(` ${text}`));
            btn.addEventListener("click", () => submitAnswer(letter));
            choicesDiv.appendChild(btn);
        }

        // Add skip button at the end of choices
        const skipBtn = document.createElement("button");
        skipBtn.id = "skip-btn";
        skipBtn.className = "choice-btn choice-skip";
        skipBtn.addEventListener("click", (e) => { e.stopPropagation(); skipQuestion(); });
        const remaining = Math.max(0, Number(data.skip_remaining || 0));
        const skipText = document.createElement("span");
        if (remaining > 0) {
            skipText.textContent = `Skip (${remaining} left)`;
        } else {
            skipText.textContent = "No skips remaining";
            skipBtn.disabled = true;
        }
        skipBtn.appendChild(skipText);
        const skipKey = document.createElement("span");
        skipKey.className = "choice-letter";
        skipKey.textContent = "F";
        skipBtn.appendChild(skipKey);
        choicesDiv.appendChild(skipBtn);

        document.getElementById("question-card").style.display = "block";
        updateTheta(data.theta);
    }

    async function submitAnswer(chosen) {
        if (state.answered) return;
        state.answered = true;

        document.querySelectorAll(".choice-btn").forEach(btn => {
            btn.disabled = true;
        });
        const skipEl = document.getElementById("skip-btn");
        if (skipEl) skipEl.disabled = true;

        let data;
        try {
            const resp = await fetch("/api/answer", {
                method: "POST",
                headers: {"Content-Type": "application/json", "X-CSRF-Token": csrfToken},
                body: JSON.stringify({
                    chosen: chosen,
                    elapsed: (Date.now() - state.startTime) / 1000,
                }),
            });
            data = await resp.json();
        } catch (e) {
            console.error("Answer submit failed:", e);
            state.answered = false;
            document.querySelectorAll(".choice-btn").forEach(btn => btn.disabled = false);
            return;
        }

        document.querySelectorAll(".choice-btn").forEach(btn => {
            if (btn.dataset.letter === data.correct_answer) {
                btn.classList.add("correct");
            }
            if (btn.dataset.letter === chosen && !data.correct) {
                btn.classList.add("incorrect");
            }
        });

        const feedback = document.getElementById("feedback");
        if (data.correct) {
            feedback.textContent = "Correct!";
            feedback.className = "feedback feedback-correct";
        } else {
            feedback.textContent = `Incorrect. The answer is ${data.correct_answer}.`;
            feedback.className = "feedback feedback-incorrect";
        }

        updateTheta(data.theta, data.correct, data.blooms_level);
        updateSkipUi(data.skip_remaining, state.currentItem.skip_budget);

        if (data.done) {
            document.getElementById("next-btn").textContent = "View Results";
            document.getElementById("next-btn").onclick = () => window.location.href = "/exam/{{ exam.id }}/results";
        } else {
            document.getElementById("next-btn").onclick = loadNextQuestion;
        }
        document.getElementById("next-btn").style.display = "block";
    }

    async function skipQuestion() {
        if (state.answered) return;
        state.answered = true;

        document.querySelectorAll(".choice-btn").forEach(btn => {
            btn.disabled = true;
        });
        const skipBtn = document.getElementById("skip-btn");
        skipBtn.disabled = true;

        const resp = await fetch("/api/skip", {
            method: "POST",
            headers: {"Content-Type": "application/json", "X-CSRF-Token": csrfToken},
            body: JSON.stringify({
                elapsed: (Date.now() - state.startTime) / 1000,
            }),
        });
        const data = await resp.json();

        if (!resp.ok || data.error) {
            state.answered = false;
            document.querySelectorAll(".choice-btn").forEach(btn => {
                btn.disabled = false;
            });
            updateSkipUi(state.currentItem?.skip_remaining, state.currentItem?.skip_budget);
            const feedback = document.getElementById("feedback");
            feedback.textContent = data.error || "Unable to skip this question.";
            feedback.className = "feedback feedback-incorrect";
            return;
        }

        if (state.currentItem) {
            state.currentItem.skip_remaining = data.skip_remaining;
        }
        loadNextQuestion();
    }

    let chartVisible = localStorage.getItem('chartVisible') !== 'false';
    function toggleChart() {
        chartVisible = !chartVisible;
        localStorage.setItem('chartVisible', chartVisible);
        const canvas = document.getElementById('skill-chart');
        const btn = document.getElementById('chart-toggle');
        canvas.style.display = chartVisible ? '' : 'none';
        btn.textContent = chartVisible ? '\u25BC' : '\u25B6';
    }
    // Apply initial state
    if (!chartVisible) {
        document.getElementById('skill-chart').style.display = 'none';
        document.getElementById('chart-toggle').textContent = '\u25B6';
    }

    function thetaToSkill(theta) {
        // Linear map: theta [-3, 3] -> skill [1, 5]
        // Clamp to range
        const clamped = Math.min(3, Math.max(-3, theta));
        return 1 + (clamped + 3) * (4 / 6);
    }

    const BLOOMS_COLORS = {
        0: '#fb923c',  // unclassified — orange (visible in both modes)
        1: '#4ade80',  // Remember — green
        2: '#60a5fa',  // Understand — blue
        3: '#fbbf24',  // Apply — amber
        4: '#a78bfa',  // Analyze — purple
        5: '#f43f5e',  // Evaluate — rose
        6: '#14b8a6',  // Create — teal
    };
    const BLOOMS_NAMES = {
        0: '?', 1: 'Remember', 2: 'Understand', 3: 'Apply',
        4: 'Analyze', 5: 'Evaluate', 6: 'Create',
    };

    function updateTheta(theta, correct, bloomsLevel) {
        if (theta === undefined || theta === null) theta = 0;
        const skill = thetaToSkill(theta);
        if (correct !== undefined) {
            state.thetaHistory.push({
                question: state.thetaHistory.length + 1,
                skill: skill,
                correct: correct,
                blooms: bloomsLevel || 0,
                elapsed: (Date.now() - state.startTime) / 1000,
            });
        }
        drawSkillChart();
    }

    function drawSkillChart() {
        const canvas = document.getElementById("skill-chart");
        const ctx = canvas.getContext("2d");
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        const W = rect.width;
        const H = rect.height;

        const pad = {top: 15, right: 20, bottom: 30, left: 15};
        const plotW = W - pad.left - pad.right;
        const plotH = H - pad.top - pad.bottom;

        ctx.clearRect(0, 0, W, H);

        // Read theme colors from CSS
        const style = getComputedStyle(document.documentElement);
        const textFaint = style.getPropertyValue('--text-faint').trim() || '#9ca3af';
        const lineColor = style.getPropertyValue('--accent').trim() || '#2563eb';

        const history = state.thetaHistory;
        if (history.length === 0) {
            ctx.fillStyle = textFaint;
            ctx.font = "14px system-ui";
            ctx.textAlign = "center";
            ctx.fillText("Answer questions to see your challenge level", W / 2, H / 2);
            return;
        }

        const maxTime = history[history.length - 1].elapsed * 1.1 || 60;
        const maxQ = Math.max(10, history.length + 2);  // keep for confidence band indexing
        const skills = history.map(h => h.skill);
        const dataMin = Math.min(...skills);
        const dataMax = Math.max(...skills);
        const margin = Math.max(0.3, (dataMax - dataMin) * 0.15);
        const minT = dataMin - margin;
        const maxT = dataMax + margin;

        function x(t) { return pad.left + (t / maxTime) * plotW; }
        function y(t) { return pad.top + plotH - ((t - minT) / (maxT - minT)) * plotH; }


        // Line
        ctx.strokeStyle = lineColor;
        ctx.lineWidth = 2.5;
        ctx.lineJoin = "round";
        ctx.beginPath();
        for (let i = 0; i < history.length; i++) {
            const px = x(history[i].elapsed);
            const py = y(history[i].skill);
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
        ctx.stroke();

        // Points — colored by Bloom's taxonomy
        for (let i = 0; i < history.length; i++) {
            const px = x(history[i].elapsed);
            const py = y(history[i].skill);
            const bl = history[i].blooms || 0;
            ctx.fillStyle = BLOOMS_COLORS[bl] || BLOOMS_COLORS[0];
            ctx.beginPath();
            ctx.arc(px, py, 4, 0, Math.PI * 2);
            ctx.fill();
        }

        // X axis — time labels
        ctx.fillStyle = textFaint;
        ctx.font = "10px system-ui";
        ctx.textAlign = "center";
        // Pick sensible time intervals
        const totalSec = maxTime;
        let interval;
        if (totalSec <= 120) interval = 30;
        else if (totalSec <= 600) interval = 60;
        else if (totalSec <= 1800) interval = 300;
        else interval = 600;
        for (let t = interval; t < maxTime; t += interval) {
            const mins = Math.floor(t / 60);
            const secs = Math.floor(t % 60);
            const label = mins > 0 ? (secs > 0 ? `${mins}m${secs.toString().padStart(2,'0')}s` : `${mins}m`) : `${secs}s`;
            ctx.fillText(label, x(t), H - pad.bottom + 14);
        }


        // Legend — Bloom's taxonomy
        const usedBlooms = [...new Set(history.map(h => h.blooms || 0))].sort();
        const legY = pad.top + 3;
        ctx.font = "9px system-ui";
        ctx.textAlign = "left";
        let legX = W - pad.right - usedBlooms.length * 65;
        for (const bl of usedBlooms) {
            ctx.fillStyle = BLOOMS_COLORS[bl];
            ctx.beginPath(); ctx.arc(legX, legY, 3.5, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = textFaint;
            ctx.fillText(BLOOMS_NAMES[bl], legX + 7, legY + 3);
            legX += 65;
        }
    }

    async function finishExam() {
        if (!confirm("Are you sure you want to finish the exam?")) return;
        await fetch("/api/finish", {
            method: "POST",
            headers: {"X-CSRF-Token": csrfToken},
        });
        window.location.href = "/exam/{{ exam.id }}/results";
    }

    // Keyboard shortcuts
    document.addEventListener("keydown", (e) => {
        const key = e.key.toUpperCase();
        if (!state.answered && "ABCDE".includes(key)) {
            e.preventDefault();
            submitAnswer(key);
        } else if (!state.answered && key === "F") {
            e.preventDefault();
            skipQuestion();
        } else if (state.answered && (e.key === "Enter" || e.key === " ")) {
            e.preventDefault();
            const nextBtn = document.getElementById("next-btn");
            if (nextBtn.style.display !== "none") {
                nextBtn.click();
            }
        } else if (e.key === "ArrowLeft") {
            e.preventDefault();
            const viewer = document.getElementById("pdf-viewer");
            if (viewer) viewer.contentWindow.postMessage({type: "prevPage"}, "*");
        } else if (e.key === "ArrowRight") {
            e.preventDefault();
            const viewer = document.getElementById("pdf-viewer");
            if (viewer) viewer.contentWindow.postMessage({type: "nextPage"}, "*");
        }
    });

    // Resize handle for PDF panel
    (() => {
        const handle = document.getElementById("resize-handle");
        const pdfPanel = document.getElementById("pdf-panel");
        if (!handle || !pdfPanel) return;
        const questionPanel = document.querySelector(".question-panel");
        let dragging = false;

        handle.addEventListener("mousedown", (e) => {
            dragging = true;
            document.body.style.cursor = "col-resize";
            document.body.style.userSelect = "none";
            pdfPanel.style.pointerEvents = "none";
            e.preventDefault();
        });

        document.addEventListener("mousemove", (e) => {
            if (!dragging) return;
            const layout = document.querySelector(".exam-layout");
            const layoutRect = layout.getBoundingClientRect();
            const handleWidth = 6;
            const mouseX = e.clientX - layoutRect.left;
            const leftPct = Math.min(80, Math.max(20, (mouseX / layoutRect.width) * 100));
            const rightPct = 100 - leftPct;

            questionPanel.style.flex = "none";
            questionPanel.style.width = `calc(${leftPct}% - ${handleWidth / 2}px)`;
            pdfPanel.style.flex = "none";
            pdfPanel.style.width = `calc(${rightPct}% - ${handleWidth / 2}px)`;
        });

        document.addEventListener("mouseup", () => {
            if (!dragging) return;
            dragging = false;
            document.body.style.cursor = "";
            document.body.style.userSelect = "";
            pdfPanel.style.pointerEvents = "";
        });
    })();

    // Restore history if continuing a session, then load next question
    async function init() {
        const resp = await fetch("/api/history");
        const data = await resp.json();
        if (data.history && data.history.length > 0) {
            for (const h of data.history) {
                state.thetaHistory.push({
                    question: h.question,
                    skill: thetaToSkill(h.theta),
                    correct: h.correct,
                    blooms: h.blooms_level || 0,
                    elapsed: h.elapsed,
                });
            }
            // Set startTime so new answers continue from last elapsed
            const lastElapsed = data.history[data.history.length - 1].elapsed;
            state.startTime = Date.now() - (lastElapsed * 1000);
            updateTheta(data.theta);
        }
        updateSkipUi(data.skip_remaining, data.skip_budget);
        loadNextQuestion();
    }
    init();
    </script>
</body>
</html>
